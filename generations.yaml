generations:
  - name: "First Generation (A94) Pre-Facelift"
    start_year: 2013
    end_year: 2015
    description: "The original Peugeot 2008 was introduced at the 2013 Geneva Motor Show as a subcompact crossover SUV based on the PF1 platform shared with the 208 hatchback. Positioned below the 3008, it replaced the 207 SW as Peugeot did not release a station wagon version of the 208. The design featured increased ride height, plastic body cladding, roof rails, and distinctive front grille with rugged styling elements. Powertrain options included various gasoline engines from 1.2L to 1.6L PureTech and diesel options from 1.4L to 1.6L BlueHDi, paired with manual or automatic transmissions driving front wheels only. The interior showcased Peugeot's i-Cockpit design with a small steering wheel positioned below the instrument cluster, high-mounted dashboard, and premium materials. Available features included Grip Control enhanced traction system for light off-road capability, touchscreen infotainment system, and panoramic glass roof."

  - name: "First Generation (A94) Facelift"
    start_year: 2016
    end_year: 2019
    description: "The facelifted first-generation 2008 was released in February 2016, featuring a more vertical grille design, additional body cladding, and expanded equipment offerings. The update coincided with the revised 208 platform and brought styling updates to align with Peugeot's evolving design language. The Grip Control system remained available for enhanced traction on various surfaces. In Brazil, the 2008 received a unique facelift in 2019 to maintain competitiveness until the new generation arrived. Production in Brazil continued until November 2023 for South American markets, but the platform/generation effectively ended with the second-generation launch in 2020 for European and global markets."

  - name: "Second Generation (P24) Pre-Facelift"
    start_year: 2020
    end_year: 2022
    description: "The second-generation Peugeot 2008 was announced on June 19, 2019, featuring dramatically more distinctive styling with bold LED 'fang' daytime running lights and a muscular stance. Built on PSA's Common Modular Platform (CMP) shared with the 208, DS 3 Crossback, and Opel Corsa F, it grew significantly in all dimensions. Powertrain options included PureTech gasoline engines (100-155 hp), BlueHDi diesel options in some markets, and the fully electric e-2008 with 50 kWh battery providing 310 km range. The interior featured the latest i-Cockpit evolution with a 3D digital instrument display, 10-inch touchscreen on higher trims, and distinctive piano-key style toggle switches. Advanced technology included adaptive cruise control, lane positioning assist, automated parking, and driver assistance features."

  - name: "Second Generation (P24) Facelift"
    start_year: 2023
    end_year: null
    description: "The facelifted second-generation 2008 was officially unveiled on May 4, 2023, featuring visual changes including new headlights, front apron, grille with body-colored elements, and updated tail lights. LED headlights and lights became standard across all trims. The e-2008 received a larger 54 kWh battery and new motor, increasing range from 345 km to 406 km under WLTP testing. Internal combustion engines carried over with minor refinements. The updated model incorporates Peugeot's new brand identity and offers additional color options. The e-2008 charging capability remains up to 100 kW where supported. Production continues at various PSA plants including El Palomar factory in Argentina for Latin American markets launched August 2024 with Fiat-sourced FireFly 1.0L turbo engine."